[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -q
markers =
    unit: fast unit tests (no external deps)
    integration: needs PyTorch (CPU ok)
    gpu: needs CUDA GPU
    hardware: needs physical camera or MIDI
    slow: takes >5 seconds

[tool:pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
